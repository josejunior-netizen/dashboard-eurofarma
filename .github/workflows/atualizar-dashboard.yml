name: Atualizar Dashboard Eurofarma

on:
  schedule:
    - cron: '0 11 * * 1-5'
    - cron: '0 15 * * 1-5'
    - cron: '0 19 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:

jobs:
  atualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install requests openpyxl
          sudo apt-get install -y libreoffice

      - name: Verificar secrets
        run: |
          if [ -z "$ONEDRIVE_URL" ]; then
            echo "ERRO: ONEDRIVE_URL está vazio"
          else
            echo "ONEDRIVE_URL OK (${#ONEDRIVE_URL} caracteres)"
          fi
          if [ -z "$SOURCING_URL" ]; then
            echo "ERRO: SOURCING_URL está vazio"
          else
            echo "SOURCING_URL OK (${#SOURCING_URL} caracteres)"
          fi
        env:
          ONEDRIVE_URL: ${{ secrets.ONEDRIVE_URL }}
          SOURCING_URL: ${{ secrets.SOURCING_URL }}

      - name: Baixar XLS e gerar data.js
        env:
          ONEDRIVE_URL: ${{ secrets.ONEDRIVE_URL }}
          SOURCING_URL: ${{ secrets.SOURCING_URL }}
        run: python scripts/gerar_data.py

      - name: Commitar e publicar se houve mudança
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data.js
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos dados. Nada a commitar."
          else
            TIMESTAMP=$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')
            git commit -m "dados: atualização automática ${TIMESTAMP}"
            git push
          fi
