name: Atualizar Dashboard Eurofarma

on:
  schedule:
    # Roda aos :10 de cada hora, das 07:10 às 20:10 de Brasília (UTC-3)
    # Equivalente a 10:10–23:10 UTC, de segunda a sexta
    - cron: '10 10 * * 1-5'
    - cron: '10 11 * * 1-5'
    - cron: '10 12 * * 1-5'
    - cron: '10 13 * * 1-5'
    - cron: '10 14 * * 1-5'
    - cron: '10 15 * * 1-5'
    - cron: '10 16 * * 1-5'
    - cron: '10 17 * * 1-5'
    - cron: '10 18 * * 1-5'
    - cron: '10 19 * * 1-5'
    - cron: '10 20 * * 1-5'
    - cron: '10 21 * * 1-5'
    - cron: '10 22 * * 1-5'
  workflow_dispatch:

concurrency:
  group: atualizar-dashboard
  cancel-in-progress: true

# Permissão explícita para o bot fazer commit/push no repo
permissions:
  contents: write

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4
        with:
          # Necessário para git pull --rebase funcionar (precisa do histórico)
          fetch-depth: 0

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install requests openpyxl
          sudo apt-get install -y libreoffice

      - name: Verificar secrets
        run: |
          if [ -z "$ONEDRIVE_URL" ]; then
            echo "ERRO: ONEDRIVE_URL está vazio"
          else
            echo "ONEDRIVE_URL OK (${#ONEDRIVE_URL} caracteres)"
          fi
          if [ -z "$SOURCING_URL" ]; then
            echo "ERRO: SOURCING_URL está vazio"
          else
            echo "SOURCING_URL OK (${#SOURCING_URL} caracteres)"
          fi
        env:
          ONEDRIVE_URL: ${{ secrets.ONEDRIVE_URL }}
          SOURCING_URL: ${{ secrets.SOURCING_URL }}

      - name: Baixar XLS e gerar data.js
        env:
          ONEDRIVE_URL: ${{ secrets.ONEDRIVE_URL }}
          SOURCING_URL: ${{ secrets.SOURCING_URL }}
        run: python scripts/gerar_data.py

      - name: Commitar e publicar se houve mudança
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data.js
          if git diff --staged --quiet; then
            echo "Nenhuma mudança nos dados. Nada a commitar."
          else
            TIMESTAMP=$(TZ='America/Sao_Paulo' date '+%d/%m/%Y %H:%M')
            git commit -m "dados: atualização automática ${TIMESTAMP}"

            # Tenta o push até 3 vezes, fazendo pull --rebase entre tentativas.
            # Resolve race condition entre commits manuais e o cron automático.
            for i in 1 2 3; do
              echo "Tentativa de push $i/3..."
              if git push; then
                echo "Push bem-sucedido na tentativa $i"
                exit 0
              fi
              echo "Push falhou. Fazendo pull --rebase e tentando novamente..."
              git pull --rebase origin main || {
                echo "Pull --rebase falhou. Abortando."
                exit 1
              }
            done

            echo "ERRO: 3 tentativas de push falharam"
            exit 1
          fi
